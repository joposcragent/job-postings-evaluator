# JSON console: set SPRING_PROFILES_ACTIVE=json-log (or add json-log to active profiles).
spring:
  application:
    name: job-postings-evaluator

logging:
  level:
    root: INFO
    ru.sadovskie.leo.app.joposcragent.job_postings_evaluator: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] requestId=%X{requestId:-} correlationId=%X{correlationId:-} %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: json-log
# logback-spring.xml switches the console appender to LogstashEncoder for this profile.
