server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: job-postings-evaluator
  flyway:
    enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/joposcragent}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

joposcragent:
  settings-manager-base-url: ${JOPOSCRAGENT_SETTINGS_MANAGER_BASE_URL:http://localhost:8080}
  sentence-transformer-base-url: ${JOPOSCRAGENT_SENTENCE_TRANSFORMER_BASE_URL:http://localhost:8000/sentence-transformer}
